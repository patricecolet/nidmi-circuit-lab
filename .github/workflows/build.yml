name: build

# Phase 1 — compile Fritzing (upstream, sans modification) et publie les binaires en
# artefacts (puis Release sur tag). Les étudiants téléchargent, zéro build, zéro paiement.
#
# macOS   : job RÉEL et validé (tools/macos/build-fritzing-mac.sh).
# Windows : job RÉEL, en cours de stabilisation (tools/windows/build-fritzing-win.ps1).
# Linux   : encore un SCAFFOLD (job `build-linux`, TODO).

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# Un nouveau push annule le run précédent (évite la saturation de la file de runners).
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  # Versions épinglées pour des builds reproductibles (à bumper consciemment).
  # develop @ 2025-10-07 : Qt6 + simulateur ngspice (le tag CD-625 d'origine était
  # un build Qt5 de 2020, incohérent avec le reste de la recette).
  FRITZING_REF: 04e5bb0241e8f1de24d0fce9be070041c6d5b68e
  PARTS_REF: develop          # branche fritzing-parts
  QT_VERSION: 6.5.3           # phoenix.pro plafonne à 6.5.10 (6.10 casse la compilation)

jobs:
  # ============================================================================
  # macOS — natif arm64 (macos-14) et x86_64 (macos-13). Produit un .dmg signé
  # ad-hoc (non notarisé : déblocage Gatekeeper documenté dans le README).
  # ============================================================================
  macos:
    name: macos-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, arch: arm64 }    # Apple Silicon
          - { os: macos-13, arch: x86_64 }   # Intel

    steps:
      - name: Checkout (ce dépôt)
        uses: actions/checkout@v4

      - name: Checkout fritzing-app
        uses: actions/checkout@v4
        with:
          repository: fritzing/fritzing-app
          ref: ${{ env.FRITZING_REF }}
          path: fritzing-app

      - name: Checkout fritzing-parts
        uses: actions/checkout@v4
        with:
          repository: fritzing/fritzing-parts
          ref: ${{ env.PARTS_REF }}
          path: fritzing-parts

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          # qtserialport : requis par phoenix.pro ; qt5compat (Core5Compat) : requis par QuaZip.
          modules: qtserialport qt5compat

      - name: Dépendances Homebrew
        run: brew install boost cmake

      # Construit les deps sœurs (libgit2 1.7.1 static, ngspice-42, Clipper1 6.4.2,
      # svgpp 1.3.1, QuaZip 1.4), patche l'archi, compile, package en .app + .dmg.
      - name: Build + package Fritzing
        env:
          ARCH: ${{ matrix.arch }}
          QT_DIR: ${{ env.QT_ROOT_DIR }}   # exporté par install-qt-action
        run: ./tools/macos/build-fritzing-mac.sh

      - name: Upload artefact (.dmg)
        uses: actions/upload-artifact@v4
        with:
          name: fritzing-macos-${{ matrix.arch }}
          path: Fritzing-${{ matrix.arch }}.dmg
          if-no-files-found: error

  # ============================================================================
  # Windows — MSVC x64, Qt 6.5.3. Produit un .zip (binaires non signés -> SmartScreen,
  # déblocage documenté dans le README). PREMIER JET : débogué au fil des runs CI.
  # ============================================================================
  windows:
    name: windows-x64
    runs-on: windows-2022
    steps:
      - name: Checkout (ce dépôt)
        uses: actions/checkout@v4

      - name: Checkout fritzing-app
        uses: actions/checkout@v4
        with:
          repository: fritzing/fritzing-app
          ref: ${{ env.FRITZING_REF }}
          path: fritzing-app

      - name: Checkout fritzing-parts
        uses: actions/checkout@v4
        with:
          repository: fritzing/fritzing-parts
          ref: ${{ env.PARTS_REF }}
          path: fritzing-parts

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtserialport qt5compat

      - name: Setup MSVC (cl/nmake dans le PATH)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Construit les deps sœurs (libgit2 dynamique, ngspice-42 DLL, Clipper1-6.4.2,
      # svgpp 1.3.1, boost 1.85, QuaZip 1.4), compile (nmake), package en .zip.
      - name: Build + package Fritzing
        shell: pwsh
        env:
          QT_DIR: ${{ env.QT_ROOT_DIR }}
        run: ./tools/windows/build-fritzing-win.ps1

      - name: Upload artefact (.zip)
        uses: actions/upload-artifact@v4
        with:
          name: fritzing-windows-x64
          path: Fritzing-win-x64.zip
          if-no-files-found: error

  # ============================================================================
  # Linux — SCAFFOLD (non validé). À reprendre sur le modèle des jobs macOS/windows :
  # deps sœurs (libgit2 dynamique via pkg-config, etc.), Qt 6.5.3, qmake puis linuxdeployqt.
  # ============================================================================
  build-linux:
    name: linux (scaffold)
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: TODO
        run: 'echo "TODO linux - porter la recette deps soeurs + Qt 6.5.3 (cf. tools/macos|windows)"'

  # Publication d'une Release (brouillon) quand on pousse un tag vX.Y.Z.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos, windows]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**
