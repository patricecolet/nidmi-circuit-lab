name: build

# Phase 1 — compile Fritzing (upstream, sans modification) et publie les binaires en
# artefacts (puis Release sur tag). Les étudiants téléchargent, zéro build, zéro paiement.
#
# macOS   : job RÉEL et validé (tools/macos/build-fritzing-mac.sh).
# Windows : job RÉEL, en cours de stabilisation (tools/windows/build-fritzing-win.ps1).
# Linux   : encore un SCAFFOLD (job `build-linux`, TODO).

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# Un nouveau push annule le run précédent (évite la saturation de la file de runners).
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  # Versions épinglées pour des builds reproductibles (à bumper consciemment).
  # develop @ 2025-10-07 : Qt6 + simulateur ngspice (le tag CD-625 d'origine était
  # un build Qt5 de 2020, incohérent avec le reste de la recette).
  FRITZING_REF: 04e5bb0241e8f1de24d0fce9be070041c6d5b68e
  PARTS_REF: develop          # branche fritzing-parts
  QT_VERSION: 6.5.3           # phoenix.pro plafonne à 6.5.10 (6.10 casse la compilation)

jobs:
  # ============================================================================
  # macOS arm64 (Apple Silicon) — job BLOQUANT (la release l'attend).
  # Produit un .dmg signé ad-hoc (non notarisé : Gatekeeper documenté au README).
  # ============================================================================
  macos-arm64:
    name: macos-arm64
    runs-on: macos-14
    timeout-minutes: 45   # garde-fou : un hang échoue vite (pas 6 h de minutes macOS)
    steps:
      - name: Checkout (ce dépôt)
        uses: actions/checkout@v4
      - name: Checkout fritzing-app
        uses: actions/checkout@v4
        with: { repository: fritzing/fritzing-app, ref: "${{ env.FRITZING_REF }}", path: fritzing-app }
      - name: Checkout fritzing-parts
        uses: actions/checkout@v4
        with: { repository: fritzing/fritzing-parts, ref: "${{ env.PARTS_REF }}", path: fritzing-parts }
      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: qtserialport qt5compat   # serialport (phoenix.pro) ; qt5compat (QuaZip)
      - name: Dépendances Homebrew
        run: brew install boost cmake
      - name: Cache deps sœurs
        uses: actions/cache@v4
        with:
          path: |
            libgit2-1.7.1
            ngspice-42
            Clipper1
            svgpp-1.3.1
            quazip-6.5.3-1.4intuisphere
          key: macos-deps-arm64-${{ hashFiles('tools/macos/build-fritzing-mac.sh') }}
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with: { key: macos-arm64, max-size: 1G }
      - name: Build + package Fritzing
        env: { ARCH: arm64, QT_DIR: "${{ env.QT_ROOT_DIR }}" }
        run: ./tools/macos/build-fritzing-mac.sh
      - name: Upload artefact (.dmg)
        uses: actions/upload-artifact@v4
        with: { name: fritzing-macos-arm64, path: Fritzing-arm64.dmg, if-no-files-found: error }

  # ============================================================================
  # macOS x86_64 (Intel) — best-effort, NON bloquant (runners macos-13 rares).
  # continue-on-error + hors du `needs` de la release : ne bloque jamais.
  # Son .dmg est inclus à la release s'il est prêt à temps.
  # ============================================================================
  macos-intel:
    name: macos-intel
    runs-on: macos-13
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - name: Checkout (ce dépôt)
        uses: actions/checkout@v4
      - name: Checkout fritzing-app
        uses: actions/checkout@v4
        with: { repository: fritzing/fritzing-app, ref: "${{ env.FRITZING_REF }}", path: fritzing-app }
      - name: Checkout fritzing-parts
        uses: actions/checkout@v4
        with: { repository: fritzing/fritzing-parts, ref: "${{ env.PARTS_REF }}", path: fritzing-parts }
      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: qtserialport qt5compat
      - name: Dépendances Homebrew
        run: brew install boost cmake
      - name: Cache deps sœurs
        uses: actions/cache@v4
        with:
          path: |
            libgit2-1.7.1
            ngspice-42
            Clipper1
            svgpp-1.3.1
            quazip-6.5.3-1.4intuisphere
          key: macos-deps-x86_64-${{ hashFiles('tools/macos/build-fritzing-mac.sh') }}
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with: { key: macos-x86_64, max-size: 1G }
      - name: Build + package Fritzing
        env: { ARCH: x86_64, QT_DIR: "${{ env.QT_ROOT_DIR }}" }
        run: ./tools/macos/build-fritzing-mac.sh
      - name: Upload artefact (.dmg)
        uses: actions/upload-artifact@v4
        with: { name: fritzing-macos-x86_64, path: Fritzing-x86_64.dmg, if-no-files-found: error }

  # ============================================================================
  # Windows — MSVC x64, Qt 6.5.3. Produit un .zip (binaires non signés -> SmartScreen,
  # déblocage documenté dans le README). PREMIER JET : débogué au fil des runs CI.
  # ============================================================================
  windows:
    name: windows-x64
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - name: Checkout (ce dépôt)
        uses: actions/checkout@v4

      - name: Checkout fritzing-app
        uses: actions/checkout@v4
        with:
          repository: fritzing/fritzing-app
          ref: ${{ env.FRITZING_REF }}
          path: fritzing-app

      - name: Checkout fritzing-parts
        uses: actions/checkout@v4
        with:
          repository: fritzing/fritzing-parts
          ref: ${{ env.PARTS_REF }}
          path: fritzing-parts

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtserialport qt5compat

      - name: Setup MSVC (cl/nmake dans le PATH)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Cache des deps sœurs (versions figées) : le script saute leur rebuild si présentes.
      - name: Cache deps sœurs
        uses: actions/cache@v4
        with:
          path: |
            libgit2
            ngspice-42
            Clipper1-6.4.2
            svgpp-1.3.1
            boost_1_85_0
            zlib
            quazip-6.5.3-1.4intuisphere
          key: windows-deps-${{ hashFiles('tools/windows/build-fritzing-win.ps1') }}

      # Construit les deps sœurs manquantes, compile (nmake), package en .zip.
      - name: Build + package Fritzing
        shell: pwsh
        env:
          QT_DIR: ${{ env.QT_ROOT_DIR }}
        run: ./tools/windows/build-fritzing-win.ps1

      - name: Upload artefact (.zip)
        uses: actions/upload-artifact@v4
        with:
          name: fritzing-windows-x64
          path: Fritzing-win-x64.zip
          if-no-files-found: error

  # ============================================================================
  # Linux — AppImage (x86_64). PREMIER JET, best-effort (continue-on-error, hors
  # du needs de la release) : ne bloque pas tant qu'il n'est pas stabilisé.
  # ============================================================================
  linux:
    name: linux-x86_64
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout (ce dépôt)
        uses: actions/checkout@v4
      - name: Checkout fritzing-app
        uses: actions/checkout@v4
        with: { repository: fritzing/fritzing-app, ref: "${{ env.FRITZING_REF }}", path: fritzing-app }
      - name: Checkout fritzing-parts
        uses: actions/checkout@v4
        with: { repository: fritzing/fritzing-parts, ref: "${{ env.PARTS_REF }}", path: fritzing-parts }
      - name: Dépendances système (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libssl-dev zlib1g-dev \
            libgl1-mesa-dev libglu1-mesa-dev bison flex pkg-config patchelf \
            libfuse2 file unzip curl libxcb-cursor0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0
      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: gcc_64   # aqt : Linux desktop = gcc_64 (PAS linux_gcc_64)
          modules: qtserialport qt5compat
      - name: Cache deps sœurs
        uses: actions/cache@v4
        with:
          path: |
            libgit2-1.7.1
            ngspice-42
            Clipper1
            svgpp-1.3.1
            boost_1_85_0
            quazip-6.5.3-1.4intuisphere
          key: linux-deps-${{ hashFiles('tools/linux/build-fritzing-linux.sh') }}
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with: { key: linux-x86_64, max-size: 1G }
      - name: Build + package Fritzing
        env: { QT_DIR: "${{ env.QT_ROOT_DIR }}" }
        run: ./tools/linux/build-fritzing-linux.sh
      - name: Upload artefact (.AppImage)
        uses: actions/upload-artifact@v4
        with: { name: fritzing-linux-x86_64, path: Fritzing-x86_64.AppImage, if-no-files-found: error }

  # Publication d'une Release (brouillon) quand on pousse un tag vX.Y.Z.
  # Ne dépend que d'arm64 + Windows ; le .dmg Intel est inclus s'il est prêt à temps.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos-arm64, windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write   # requis pour créer la Release (sinon 403)
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Fritzing (édition cours) ${{ github.ref_name }}
          files: artifacts/**
          body: |
            **Build éducatif non-officiel de [Fritzing](https://fritzing.org)** — gratuit, multiplateforme.
            Ce n'est pas le projet Fritzing ; pour le binaire officiel et le soutenir : fritzing.org.

            ### Téléchargements
            - **macOS Apple Silicon** : `Fritzing-arm64.dmg`
            - **macOS Intel** : `Fritzing-x86_64.dmg` *(inclus si le build Intel a abouti)*
            - **Windows 64-bit** : `Fritzing-win-x64.zip`

            ### Premier lancement (binaires non signés)
            - **macOS** — si **rien ne s'affiche** au lancement (aucune fenêtre, souvent **sans message**), c'est Gatekeeper qui bloque l'app non notarisée. Débloquer via le Terminal (fiable même sans message) :
              ```
              xattr -dr com.apple.quarantine /Applications/Fritzing.app
              ```
              puis relancer. (Alternative : clic droit ▸ Ouvrir, ou Réglages ▸ Confidentialité et sécurité ▸ « Ouvrir quand même ».)
            - **Windows** : SmartScreen ▸ « Informations complémentaires » ▸ « Exécuter quand même ».

            Fritzing est sous GPLv3 ; les pièces (fritzing-parts) sous CC-BY-SA.
